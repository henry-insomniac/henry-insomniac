name: Update profile dashboard

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run tests
        run: npm test

      - name: Generate profile assets
        run: npm run generate
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit generated assets
        run: |
          if git diff --quiet; then
            echo "Profile dashboard is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/profile-dashboard.svg
          git commit -m "Update profile dashboard"
          git push
